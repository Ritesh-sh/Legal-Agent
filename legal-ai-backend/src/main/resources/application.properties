spring.application.name=Legal AI Assistant

# Server
server.port=8080

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta
gemini.model=gemma-3-4b-it

# Legal Acts PDF Folder
legal.acts.folder=legal_acts

# Logging
logging.level.com.legalai=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
